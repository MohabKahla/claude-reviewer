name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.title, 'skip-review') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: true
          classify_inline_comments: true
          include_fix_links: true
          prompt: |
            Repository: ${{ github.repository }}
            Pull Request: #${{ github.event.pull_request.number }}

            ## Step 1: Gather context
            - Run `gh pr view ${{ github.event.pull_request.number }}` to read the PR title, description, and any requirements stated by the author.
            - Run `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --paginate` to read all existing inline review comments.
            - Run `gh pr view ${{ github.event.pull_request.number }} --comments` to read all existing PR conversation comments.
            - If the PR description contains `fixes #N`, `closes #N`, or `resolves #N`, run `gh issue view N` for each referenced issue to fetch its body. Use this as additional context to verify the code addresses the issue requirements.
            Use this context throughout the review:
            - If prior review comments from this bot already cover an issue, do NOT post a duplicate — skip it.
            - Focus on surfacing only NEW findings. If a previous finding appears resolved by new commits, note that briefly in the summary instead.

            ## Step 2: Run /review
            Review the pull request for code quality, bugs, test gaps, and regressions.
            Verify that everything described or promised in the PR description is actually implemented. If something is missing or incomplete, flag it explicitly.
            If linked issues were fetched in Step 1, verify the code actually addresses their requirements. Flag any gaps.

            **Fast path**: If the PR only changes documentation files (.md), lockfiles (package-lock.json, yarn.lock, Gemfile.lock), or auto-generated files, perform a lighter review focused on correctness only — skip style and architecture analysis.

            **Comment budget**: Post at most 10 inline comments total across both code review (Step 2) and security review (Step 3). Prioritize critical and warning severity findings. If more findings exist beyond 10, save them for the "Additional Findings" section in the summary.

            **Suggestion blocks**: For simple, mechanical fixes (typos, missing null checks, obvious off-by-one errors), include a GitHub suggestion block in the inline comment body so the developer can one-click commit:
            ```suggestion
            corrected code here
            ```
            Do NOT use suggestion blocks for architectural changes, refactors, or multi-file fixes.

            Post inline comments for each finding.

            ## Step 3: Run /security-review
            Review the pull request for security issues: injection, auth bypass, secrets exposure, XSS, SSRF, path traversal, insecure deserialization, broken access control.
            The same comment budget applies — at most 10 inline comments across both reviews combined. Prioritize critical findings.
            Post inline comments for each finding.

            ## Step 4: Post summary
            After both reviews, post a single top-level PR comment using `gh pr comment` with this exact format:

            ```
            ## Code Review

            <Brief overall assessment>

            | Findings | Critical |
            |----------|----------|
            | <total count> | <critical count> |

            ## Security Review

            <Brief security assessment>

            | Findings | Critical |
            |----------|----------|
            | <total count> | <critical count> |

            ### Changes Walkthrough
            <One-liner per changed file explaining what changed and why. Cap at 15 files. Skip generated files, lockfiles, and trivial test-only churn.>

            | File | Change |
            |------|--------|
            | `path/to/file.ts` | <brief description> |

            ### Risk Flags
            <List any that apply, or "None detected.">
            - 🔐 `touches-auth` — changes in auth/authorization code paths
            - 🗄️ `db-migration` — migration files changed
            - 🌐 `api-surface` — public API or endpoint changes
            - 🧪 `no-tests-changed` — code changed but no test files modified
            - ⚙️ `config-change` — CI/CD, env, or infrastructure config modified

            ### Missing from PR description
            <List anything promised in the PR description but not implemented, or "None — all described changes are implemented.">
            <If linked issues were fetched, list any issue requirements not addressed by the code.>

            ### Suggested Labels
            <Comma-separated list of applicable labels: `has-tests`, `touches-auth`, `db-migration`, `config`, `docs-only`, `security-sensitive`. Omit if none apply.>

            ### Additional Findings
            <If the comment budget was exceeded, list remaining findings here grouped by severity. Otherwise omit this section.>

            ---
            _Automated by Claude Code_
            ```
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(git diff*),Bash(git log*),Bash(git show*),Bash(gh pr diff*),Bash(gh pr view*),Bash(gh pr comment*),Bash(gh api repos/*/pulls/*/comments*),Bash(gh issue view*),Read,Glob,Grep"
            --max-turns 40
