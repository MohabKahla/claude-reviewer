name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    if: >
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Write output schema
        run: |
          cat > /tmp/review-schema.json <<'EOF'
          {
            "type": "object",
            "properties": {
              "summary": { "type": "string" },
              "verdict": { "type": "string", "enum": ["approve", "request_changes", "comment"] },
              "finding_count": { "type": "integer" },
              "critical_count": { "type": "integer" }
            },
            "required": ["summary", "verdict", "finding_count", "critical_count"],
            "additionalProperties": false
          }
          EOF

      - name: Run code review
        id: review
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          display_report: true
          classify_inline_comments: true
          include_fix_links: true
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(git diff*),Bash(git log*),Bash(git show*),Bash(gh pr diff*),Bash(gh pr view*),Read,Glob,Grep"
            --max-turns 10
            --json-schema /tmp/review-schema.json
          prompt: |
            Run /review on this codebase.
            Repository: ${{ github.repository }}
            Pull Request: #${{ github.event.pull_request.number }}
            Base branch: origin/${{ github.event.pull_request.base.ref }}

            Use 'git diff origin/${{ github.event.pull_request.base.ref }}...HEAD' to see the changes.
            Use 'gh pr view ${{ github.event.pull_request.number }}' to read the PR description, then verify claimed changes are actually implemented.

            Post inline comments for each specific issue on changed lines using the mcp__github_inline_comment__create_inline_comment tool.
            Do NOT post top-level PR summary comments — the workflow handles that.

            After completing the review, return your structured JSON output with:
            - summary: brief overall assessment
            - verdict: "approve", "request_changes", or "comment"
            - finding_count: total number of inline findings posted
            - critical_count: number of critical-severity findings

      - name: Post code review summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STRUCTURED_OUTPUT: ${{ steps.review.outputs.structured_output }}
        run: |
          MARKER="<!-- claude-code-review -->"
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          if echo "$STRUCTURED_OUTPUT" | jq -e '.summary' >/dev/null 2>&1; then
            SUMMARY=$(echo "$STRUCTURED_OUTPUT" | jq -r '.summary')
            VERDICT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.verdict')
            FINDING_COUNT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.finding_count')
            CRITICAL_COUNT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.critical_count')

            case "$VERDICT" in
              approve)         VERDICT_ICON="✅" ;;
              request_changes) VERDICT_ICON="🔴" ;;
              *)               VERDICT_ICON="💬" ;;
            esac

            COMMENT_BODY="${MARKER}
          ## ${VERDICT_ICON} Code Review

          ${SUMMARY}

          | Findings | Critical |
          |----------|----------|
          | ${FINDING_COUNT} | ${CRITICAL_COUNT} |

          ---
          _Automated by Claude Code · ${SHORT_SHA}_"
          else
            COMMENT_BODY="${MARKER}
          ## Code Review

          _Code review did not produce structured output. Check the workflow logs._

          ---
          _Automated by Claude Code · ${SHORT_SHA}_"
          fi

          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -X PATCH -f body="$COMMENT_BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
          fi

  security-review:
    if: >
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Write output schema
        run: |
          cat > /tmp/review-schema.json <<'EOF'
          {
            "type": "object",
            "properties": {
              "summary": { "type": "string" },
              "verdict": { "type": "string", "enum": ["approve", "request_changes", "comment"] },
              "finding_count": { "type": "integer" },
              "critical_count": { "type": "integer" }
            },
            "required": ["summary", "verdict", "finding_count", "critical_count"],
            "additionalProperties": false
          }
          EOF

      - name: Run security review
        id: security
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          display_report: true
          classify_inline_comments: true
          include_fix_links: true
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(git diff*),Bash(git log*),Bash(git show*),Bash(gh pr diff*),Bash(gh pr view*),Read,Glob,Grep"
            --max-turns 10
            --json-schema /tmp/review-schema.json
          prompt: |
            Run /security-review on this codebase.
            Repository: ${{ github.repository }}
            Pull Request: #${{ github.event.pull_request.number }}
            Base branch: origin/${{ github.event.pull_request.base.ref }}

            Use 'git diff origin/${{ github.event.pull_request.base.ref }}...HEAD' to see the changes.
            Focus only on security-relevant findings: injection, auth bypass, secrets exposure, XSS, SSRF, path traversal, insecure deserialization, broken access control.

            Post inline comments for each security issue on changed lines using the mcp__github_inline_comment__create_inline_comment tool.
            Do NOT post top-level PR summary comments — the workflow handles that.

            After completing the review, return your structured JSON output with:
            - summary: brief security assessment
            - verdict: "approve", "request_changes", or "comment"
            - finding_count: total number of security findings posted
            - critical_count: number of critical-severity findings

      - name: Post security review summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STRUCTURED_OUTPUT: ${{ steps.security.outputs.structured_output }}
        run: |
          MARKER="<!-- claude-security-review -->"
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          if echo "$STRUCTURED_OUTPUT" | jq -e '.summary' >/dev/null 2>&1; then
            SUMMARY=$(echo "$STRUCTURED_OUTPUT" | jq -r '.summary')
            VERDICT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.verdict')
            FINDING_COUNT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.finding_count')
            CRITICAL_COUNT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.critical_count')

            case "$VERDICT" in
              approve)         VERDICT_ICON="✅" ;;
              request_changes) VERDICT_ICON="🔴" ;;
              *)               VERDICT_ICON="💬" ;;
            esac

            COMMENT_BODY="${MARKER}
          ## ${VERDICT_ICON} Security Review

          ${SUMMARY}

          | Findings | Critical |
          |----------|----------|
          | ${FINDING_COUNT} | ${CRITICAL_COUNT} |

          ---
          _Automated by Claude Code · ${SHORT_SHA}_"
          else
            COMMENT_BODY="${MARKER}
          ## Security Review

          _Security review did not produce structured output. Check the workflow logs._

          ---
          _Automated by Claude Code · ${SHORT_SHA}_"
          fi

          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -X PATCH -f body="$COMMENT_BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
          fi
